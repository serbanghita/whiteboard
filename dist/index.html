<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Whiteboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #f5f5f5;
            overflow: hidden;
        }
        #game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        canvas {
            display: block;
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        /* Floating Menu Styles */
        .floating-menu {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: white;
            border-radius: 8px;
            box-shadow: 2px 4px 8px rgba(0, 0, 0, 0.15);
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            z-index: 1000;
        }
        .floating-menu button {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.15s ease;
        }
        .floating-menu button:hover {
            background: #f0f0f0;
        }
        .floating-menu button.active {
            background: #e0e0e0;
        }
        .floating-menu button svg {
            width: 24px;
            height: 24px;
            stroke: #333;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>
<body>
    <div style="display: flex; width: 100vw; height: 100vh;">
        <div id="board1" style="flex: 1; border-right: 2px solid #ccc;"></div>
        <div id="board2" style="flex: 1;"></div>
    </div>
    <script src="demo.js"></script>
    <script>
        // Wait for script to load, demo.js sets window.Whiteboard
        window.addEventListener('load', () => {
            if (window.Whiteboard) {
                const board1 = new window.Whiteboard(document.getElementById('board1'));
                const board2 = new window.Whiteboard(document.getElementById('board2'));
                
                // Expose to window for debugging and manual testing via console
                window.board1 = board1;
                window.board2 = board2;
                
                console.log('Use `board2.load(board1.save())` to copy drawings from board 1 to board 2');
            }
        });
    </script>
</body>
</html>
